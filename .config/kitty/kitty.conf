# Fonts
font_family MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12

window_padding_width  5

enabled_layouts	tall

enable_audio_bell no

# Keybindings
# Windows
map alt+n 	new_os_window
map alt+enter 	new_window
map alt+d 	close_window	
map alt+l 	next_window
map alt+h	previous_window

# Themes
# Monokai Classic
background #3b3c35
foreground #fdfff1

cursor #fdfff1
cursor_text_color #000000
selection_foreground #3b3c35
selection_background #fdfff1

# dull black
color0 #3b3c35
# light black
color8 #6e7066

# dull red
color1 #f82570
# light red
color9 #f82570

# dull green
color2 #a6e12d
# light green
color10 #a6e12d

# yellow
color3 #e4db73
# light yellow
color11 #e4db73

# blue
color4 #fc961f
# light blue
color12 #fc961f

# magenta
color5 #ae81ff
# light magenta
color13 #ae81ff

# cyan
